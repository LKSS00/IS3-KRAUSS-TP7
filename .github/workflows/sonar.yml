name: Análisis SonarQube
on:
  push:
    branches: [ main ]
jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Compilar clases
        run: javac Proyecto/src/*.java
        
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=TU_CLAVE_DE_PROYECTO
            -Dsonar.organization=TU_ORGANIZACION
            -Dsonar.sources=Proyecto/src
            -Dsonar.java.binaries=Proyecto/src